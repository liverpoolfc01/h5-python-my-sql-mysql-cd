{% extends "base.html" %}
{% block title %}添加商品{% endblock %}
{% block content %}
<section class="admin-shell">
  <aside class="side">
    <strong>商家后台</strong>
    <a href="{{ url_for('admin_dashboard') }}">经营概览</a>
    <a href="{{ url_for('admin_product_new') }}">添加商品</a>
    <a href="{{ url_for('admin_marketing') }}">营销活动</a>
  </aside>
  <form method="post" class="form-card wide">
    <h1>添加商品</h1>
    <label>商品名<input name="name" required></label>
    <label>分类<input name="category" required></label>
    <label>价格<input name="price" type="number" step="0.01" min="0" required></label>
    <label>库存<input name="stock" type="number" min="0" required></label>
    <label>主色<input name="image_color" type="color" value="#2f80ed"></label>
    <label>描述<textarea name="description" required></textarea></label>
    <button>保存商品</button>
  </form>
</section>
{% endblock %}
